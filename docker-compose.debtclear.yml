version: '3.8'

services:
  debtclear:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: debtclear-web
    restart: unless-stopped
    ports:
      - '3100:80'
    networks:
      - caddy-proxy # <-- Hubungkan ke jaringan caddy

networks:
  caddy-proxy:
    external: true
